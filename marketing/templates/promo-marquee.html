<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Promo tile (marquee)</title>
<link rel="stylesheet" href="marketing.css">
<!-- render: 1400x560 -->
</head>
<body data-render-width="1400" data-render-height="560">
<div class="promo-m">
  <div class="promo-m__art">
    <div class="mock" data-mode="light">
      <div class="mock__title">Current session</div>
      <div class="mock__sub">Resets in 2h 14m</div>
      <div class="mock__row"><div class="mock__bar"><div class="mock__fill" style="width:54%"></div></div></div>
      <div class="mock__row"><div class="mock__row-head"><span>All models</span><span>34%</span></div><div class="mock__bar"><div class="mock__fill" style="width:34%"></div></div></div>
      <div class="mock__row"><div class="mock__row-head"><span>Sonnet only</span><span>8%</span></div><div class="mock__bar"><div class="mock__fill" style="width:8%"></div></div></div>
    </div>
  </div>
  <div class="promo-m__copy">
    <div class="promo-m__headline">Never get blindsided by a Claude limit again.</div>
    <div class="promo-m__sub">A tiny floating gauge keeps your session and weekly usage in view while you work.</div>
    <div class="promo-m__brand">
      <img src="../../src/icon/icon-128.png" alt="">
      <span>Claude Usage Widget Lite</span>
    </div>
  </div>
</div>
</body>
</html>
